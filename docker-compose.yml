services:
  postgres:
    image: postgres:16-alpine
    container_name: collab-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: collabdb
      POSTGRES_USER: collabuser
      POSTGRES_PASSWORD: collabpass
    ports:
      - "5433:5432"
    volumes:
      - collab_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U collabuser -d collabdb"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  collab_postgres_data:
